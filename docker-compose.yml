# mind-dock-v0 — dev compose
#
# A local CommunitySolidServer v7 instance on :3082 hosting the demo persona
# (alice). mind-dock itself runs on :3080 (npm run dev). Ports use 308x to
# coexist with siblings; :3081/:3083 belong to mind-hermes, so CSS is :3082.

services:
  css:
    image: solidproject/community-server:latest
    container_name: mind-dock-css
    ports:
      - "3082:3082"
    volumes:
      - ./.css-data:/data
      - ./infra/css/seed.json:/seed.json:ro
    command:
      - --port=3082
      - --baseUrl=http://localhost:3082/
      - --rootFilePath=/data
      - --config=@css:config/file.json
      - --seedConfig=/seed.json
      - --loggingLevel=warn
    restart: unless-stopped
